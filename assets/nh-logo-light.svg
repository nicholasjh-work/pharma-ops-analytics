<svg width="1600" height="360" viewBox="0 0 1600 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 180) rotate(90) scale(180 260)">
      <stop stop-color="#64748B" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#E2E8F0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 180) rotate(90) scale(180 320)">
      <stop stop-color="#64748B" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelStroke" x1="80" y1="40" x2="1520" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CBD5E1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#CBD5E1" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="logoOuter" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDFEFF"/>
      <stop offset="0.22" stop-color="#DCE4EE"/>
      <stop offset="0.52" stop-color="#8B98A9"/>
      <stop offset="0.78" stop-color="#435061"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>

    <linearGradient id="logoCut" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08101B"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>

    <linearGradient id="logoEdge" x1="18" y1="18" x2="80" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="textFill" x1="420" y1="100" x2="980" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="360" rx="28" fill="url(#glow1)"/>
  <rect width="1600" height="360" rx="28" fill="url(#glow2)"/>

  <rect x="36" y="30" width="1528" height="300" rx="26" fill="#F1F5F9"/>
  <rect x="36.75" y="30.75" width="1526.5" height="298.5" rx="25.25" stroke="url(#panelStroke)" stroke-width="1.5"/>

  <rect x="80" y="72" width="220" height="216" rx="30" fill="#F1F5F9"/>
  <rect x="81" y="73" width="218" height="214" rx="29" stroke="#CBD5E1" stroke-opacity="0.4" stroke-width="2"/>

  <!-- H logo -->
  <g transform="translate(110 100) scale(1.35)">
    <rect x="18" y="18" width="84" height="84" rx="18" fill="url(#logoOuter)"/>
    <rect x="23" y="23" width="74" height="74" rx="14" stroke="url(#logoEdge)" stroke-width="1.4"/>
    <rect x="32" y="28" width="14" height="64" rx="6" fill="url(#logoCut)"/>
    <rect x="74" y="28" width="14" height="64" rx="6" fill="url(#logoCut)"/>
    <rect x="46" y="50" width="28" height="12" rx="5" fill="url(#logoCut)"/>
    <path d="M26 26H94" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1"/>
    <path d="M26 26V94" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
  </g>

  <text x="360" y="145" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.4">
    Pharmacy Operations Analytics
  </text>

  <text x="360" y="195" fill="#1E293B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Platform
  </text>

  <text x="360" y="245" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    Real CMS Medicare Part D data powering pharmacy operations analytics
  </text>

  <text x="360" y="275" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">
    dbt • PostgreSQL • React • Snowflake
  </text>

  <rect x="1290" y="102" width="180" height="14" rx="7" fill="#CBD5E1" fill-opacity="0.4"/>
  <rect x="1330" y="136" width="120" height="14" rx="7" fill="#CBD5E1" fill-opacity="0.3"/>
  <rect x="1260" y="236" width="210" height="14" rx="7" fill="#CBD5E1" fill-opacity="0.25"/>
  <rect x="1300" y="270" width="130" height="14" rx="7" fill="#CBD5E1" fill-opacity="0.2"/>
</svg>
